services:
  controller:
    build: ./controller
    ports:
      - "8000:8000"
    environment:
      ALGORITHM: "metric_aware"

    volumes:
      - ./logs:/app/logs:z

  node1:
    build: ./node
    environment:
      NODE_ID: "1"
      MIN_DELAY: "0.1"
      MAX_DELAY: "0.5"
      # Stable node — no failures

  node2:
    build: ./node
    environment:
      NODE_ID: "2"
      MIN_DELAY: "1"
      MAX_DELAY: "2"
      CRASH_RATE: "0.1"       # 10% chance of returning HTTP 500

  node3:
    build: ./node
    environment:
      NODE_ID: "3"
      MIN_DELAY: "1.5"
      MAX_DELAY: "3"
      TIMEOUT_RATE: "0.15"    # 15% chance of hanging (simulates timeout)
